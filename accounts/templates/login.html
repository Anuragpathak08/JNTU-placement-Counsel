<!doctype html>
<html>
  <head>
    <title>Login</title>
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f0f0f;
        color: white;
      }

      .container {
        width: 350px;
        margin: 100px auto;
        padding: 30px;
        background: #1c1c1c;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
      }

      h2 {
        text-align: center;
        color: orange;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
      }

      input:focus {
        outline: 2px solid orange;
      }

      button {
        width: 100%;
        padding: 10px;
        background: orange;
        border: none;
        color: black;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #ff8c00;
      }

      a {
        color: orange;
        text-decoration: none;
      }

      .link {
        text-align: center;
        margin-top: 10px;
      }

      .error {
        color: red;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Login</h2>

      {% for message in messages %}
      <p class="error">{{ message }}</p>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />

        <button type="submit">Login</button>
      </form>

      <div class="link">
        <p>Don't have an account? <a href="{% url 'signup' %}">Signup</a></p>
      </div>
    </div>
  </body>
</html>
