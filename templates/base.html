<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        line-height: 1.6;
      }

      /* Navbar */
      .navbar {
        background: #1c1c1c;
        padding: 1rem;
        box-shadow: 0 2px 10px rgba(255, 140, 0, 0.2);
      }
      .navbar-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar-brand {
        color: orange;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 1.5rem;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
        transition: color 0.3s;
      }
      .nav-links a:hover {
        color: orange;
      }

      /* Main container */
      .main-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      /* Card style (used in forms, dashboard) */
      .card {
        background: #1c1c1c;
        border-radius: 10px;
        padding: 30px;
        margin: 20px auto;
        box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
      }
      .card h2 {
        text-align: center;
        color: orange;
        margin-bottom: 20px;
      }

      /* Form elements */
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        background: #2c2c2c;
        color: white;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid orange;
      }
      button,
      .btn {
        width: 100%;
        padding: 10px;
        background: orange;
        border: none;
        color: black;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        transition: background 0.3s;
      }
      button:hover,
      .btn:hover {
        background: #ff8c00;
      }
      .btn-secondary {
        background: #444;
        color: white;
      }
      .btn-secondary:hover {
        background: #555;
      }

      /* Table styles */
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        background: #1c1c1c;
        border-radius: 8px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        background: orange;
        color: black;
      }
      tr:hover {
        background: #2c2c2c;
      }

      /* Links */
      a {
        color: orange;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* Footer */
      footer {
        background: #1c1c1c;
        color: #aaa;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        border-top: 1px solid #333;
      }

      /* Utility classes */
      .text-center {
        text-align: center;
      }
      .error {
        color: #ff4444;
        margin: 10px 0;
        text-align: center;
      }
      .success {
        color: #4caf50;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-container">
        <a href="/" class="navbar-brand">Quiz App</a>
        <div class="nav-links">
          {% if user.is_authenticated %}
          <a href="{% url 'quiz_home' %}">Quiz</a>
          {% if user.is_staff %}
          <a href="{% url 'dash-board' %}">Dashboard</a>
          {% endif %}
          <a href="{% url 'logout' %}">Logout</a>
          {% else %}
          <a href="{% url 'login' %}">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="main-container">
      {% if messages %} {% for message in messages %}
      <div class="error">{{ message }}</div>
      {% endfor %} {% endif %} {% block content %} {% endblock %}
    </div>

    <footer>
      <p>&copy; 2026 Quiz App. All rights reserved.</p>
    </footer>
  </body>
</html>
